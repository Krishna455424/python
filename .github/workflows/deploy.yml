name: Connect EC2

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Connect to EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i private_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "hostname && uptime"
